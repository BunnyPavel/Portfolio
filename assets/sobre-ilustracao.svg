<svg viewBox="0 0 560 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustração abstrata representando fluxos de teste e validação de qualidade">
  <defs>
    <linearGradient id="aboutGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F0ABFC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="520" height="480" rx="28" fill="url(#aboutGlow)"/>
  <rect x="20.5" y="20.5" width="519" height="479" rx="27.5" fill="none" stroke="#1E293B" stroke-width="1"/>

  <!-- node 1: requirement -->
  <g>
    <rect x="60" y="80" width="150" height="64" rx="14" fill="#111827" stroke="#243044" stroke-width="1.5"/>
    <circle cx="92" cy="112" r="7" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <line x1="112" y1="103" x2="178" y2="103" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
    <line x1="112" y1="121" x2="160" y2="121" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- connector -->
  <path d="M210 112 C 250 112, 250 220, 290 220" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.7"/>

  <!-- node 2: automation script -->
  <g>
    <rect x="290" y="186" width="170" height="78" rx="14" fill="#111827" stroke="#243044" stroke-width="1.5"/>
    <circle cx="312" cy="210" r="4" fill="#F0ABFC"/>
    <circle cx="326" cy="210" r="4" fill="#A78BFA"/>
    <circle cx="340" cy="210" r="4" fill="#C4B5FD"/>
    <line x1="312" y1="230" x2="430" y2="230" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
    <line x1="312" y1="246" x2="400" y2="246" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- connector -->
  <path d="M375 264 C 375 300, 250 300, 250 336" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.7"/>

  <!-- node 3: validation / check -->
  <g>
    <rect x="100" y="336" width="190" height="84" rx="16" fill="#111827" stroke="#243044" stroke-width="1.5"/>
    <circle cx="140" cy="378" r="22" fill="none" stroke="#A78BFA" stroke-width="2"/>
    <path d="M130 378 L138 386 L152 368" fill="none" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="178" y1="368" x2="262" y2="368" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
    <line x1="178" y1="386" x2="240" y2="386" stroke="#243044" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- floating geometric accents -->
  <circle cx="470" cy="120" r="5" fill="#F0ABFC" opacity="0.7"/>
  <circle cx="450" cy="370" r="4" fill="#A78BFA" opacity="0.6"/>
  <rect x="60" y="240" width="10" height="10" rx="2" fill="#C4B5FD" opacity="0.5" transform="rotate(20 65 245)"/>
  <circle cx="500" cy="440" r="3" fill="#94A3B8" opacity="0.5"/>

  <!-- bottom label strip suggesting a pipeline -->
  <g opacity="0.8">
    <rect x="60" y="450" width="440" height="2" fill="#1E293B"/>
    <circle cx="60" cy="451" r="4" fill="#A78BFA"/>
    <circle cx="220" cy="451" r="4" fill="#C4B5FD"/>
    <circle cx="380" cy="451" r="4" fill="#F0ABFC"/>
    <circle cx="500" cy="451" r="4" fill="#94A3B8"/>
  </g>
</svg>
